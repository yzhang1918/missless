name: harness-checks

on:
  push:
    branches:
      - codex/**
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harness-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${TARGET_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Verify diff formatting
        run: git diff --check

      - name: Verify active guidance no longer points at retired workflow surfaces
        run: |
          set -euo pipefail
          matches="$(
            grep -RInE 'docs/exec-plans|docs/harness|loop-|AGENT_LOOP_WORKFLOW|harness-engineering-notes' \
              AGENTS.md ARCHITECTURE.md docs .agents/skills \
              --exclude-dir=archived \
              || true
          )"

          if [ -n "$matches" ]; then
            echo "$matches"
            exit 1
          fi

      - name: Verify archived plan catalog stays in sync
        run: |
          set -euo pipefail
          missing="$(
            find docs/plans/archived -maxdepth 1 -name '*.md' ! -name 'README.md' -exec basename {} \; \
              | while read -r file; do
                  grep -q "$file" docs/plans/archived/README.md || echo "missing:$file"
                done
          )"

          if [ -n "$missing" ]; then
            echo "$missing"
            exit 1
          fi
